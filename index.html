<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Westworld Saloon Piano Simulator V2</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <img class="piano-bg" src="assets/piano-main.png" alt="Wurlitzer style player piano interface" />

    <section class="click-layer" aria-label="Interactive piano simulator">
      <div id="rollGlow" class="roll-glow"></div>
      <div id="paperScan" class="paper-scan"></div>
      <div id="hammerRail" class="hammer-rail"></div>
      <div id="keyLights" class="key-lights"></div>

      <button id="prevBtn" class="hotspot prev" title="Previous song"></button>
      <button id="playBtn" class="hotspot play" title="Play / Pause"></button>
      <button id="nextBtn" class="hotspot next" title="Next song"></button>
      <button id="stopBtn" class="hotspot stop" title="Stop"></button>

      <div id="songMenu" class="song-menu"></div>

      <div class="status-box">
        <div>Now Playing</div>
        <strong id="nowTitle">Sweetwater.mid</strong>
        <span id="timeText">00:00 / 02:08</span>
      </div>

      <input id="speedSlider" class="speed-slider" type="range" min="50" max="160" value="100" />
      <input id="volumeSlider" class="volume-slider" type="range" min="0" max="100" value="80" />
      <label class="highlight-switch">
        <input id="highlightToggle" type="checkbox" checked />
        <span></span>
      </label>
    </section>

    <div id="startHint" class="start-hint">
      <h1>Westworld Saloon Piano Simulator</h1>
      <p>Click the play button to start the player piano.</p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
